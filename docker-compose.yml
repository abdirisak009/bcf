version: "3.9"

services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: bcf
      POSTGRES_PASSWORD: Abdi@909090@@
      POSTGRES_DB: BcfDb
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: backend
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: bcf
      DB_PASSWORD: Abdi@909090@@
      DB_NAME: BcfDb
      # MinIO — if MinIO runs in another compose service, set MINIO_ENDPOINT to that service name (e.g. minio).
      # Override all via root `.env` next to this file.
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-62.72.35.109}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-uploads}

  frontend:
    build: .
    container_name: frontend
    restart: always
    ports:
      - "3000:3000"
    command: npm run start -- -H 0.0.0.0
    depends_on:
      - backend
    environment:
      API_INTERNAL_URL: http://backend:8080
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-62.72.35.109}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-uploads}

volumes:
  pgdata:
