version: "3.9"

services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: bcf
      POSTGRES_PASSWORD: Abdi@909090@@
      POSTGRES_DB: BcfDb
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: backend
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: bcf
      DB_PASSWORD: Abdi@909090@@
      DB_NAME: BcfDb
      # Cloudinary (dashboard uploads). Override via root `.env` next to this file.
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}

  frontend:
    build: .
    container_name: frontend
    restart: always
    ports:
      - "3000:3000"
    command: npm run start -- -H 0.0.0.0
    depends_on:
      - backend
    environment:
      API_INTERNAL_URL: http://backend:8080
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}

volumes:
  pgdata:
