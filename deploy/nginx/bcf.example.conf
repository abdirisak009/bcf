# Copy to sites-available and adjust server_name + SSL.
# NEXT_PUBLIC_API_URL should be https://yourdomain.com (same host) so the browser uses /api/... on this server.

upstream bcf_next {
    server 127.0.0.1:3000;
}

upstream bcf_api {
    server 127.0.0.1:8080;
}

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    client_max_body_size 25m;

    location /api/ {
        proxy_pass http://bcf_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://bcf_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# After certbot, duplicate this block for :443 with ssl_certificate lines, or use certbot --nginx.
